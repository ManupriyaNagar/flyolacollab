<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6ef5"/>
      <stop offset="100%" stop-color="#0f4ebc"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="url(#bgBase)"/>
  <rect width="120" height="120" rx="22" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="18" cy="38" r="4" fill="#ffffff" opacity="0.35"/>
  <circle cx="14" cy="80" r="2.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="102" cy="44" r="3" fill="#ffffff" opacity="0.25"/>
  <circle cx="106" cy="90" r="2" fill="#ffffff" opacity="0.2"/>

  <!-- Ticket / boarding pass body -->
  <rect x="22" y="38" width="76" height="48" rx="7" fill="#ffffff" opacity="0.15"/>
  <rect x="22" y="38" width="76" height="48" rx="7" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Notch left -->
  <circle cx="22" cy="62" r="6" fill="#1a6ef5"/>
  <!-- Notch right -->
  <circle cx="98" cy="62" r="6" fill="#1a6ef5"/>

  <!-- Dashed divider line -->
  <line x1="28" y1="62" x2="92" y2="62" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Ticket lines top half -->
  <rect x="32" y="45" width="28" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="32" y="52" width="18" height="3" rx="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- Clock circle -->
  <circle cx="60" cy="76" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>

  <!-- Clock hands -->
  <line x1="60" y1="76" x2="60" y2="68" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="76" x2="66" y2="80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Clock center dot -->
  <circle cx="60" cy="76" r="1.8" fill="#ffffff"/>
</svg>
